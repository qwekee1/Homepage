<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Homepage</title>
    <style>
        /* Подключение шрифта Gilroy */
        @font-face {
            font-family: 'Gilroy';
            src: url('https://db.onlinewebfonts.com/t/1dc8ecd8056a0f5aa767ca893f544ca3.woff2') format('woff2');
            font-weight: 700;
        }
        @font-face {
            font-family: 'Gilroy';
            src: url('https://db.onlinewebfonts.com/t/2af9a99799980838978589255a004732.woff2') format('woff2');
            font-weight: 400;
        }

        :root {
            --bg-main: #0c0c0c;
            --card-bg: #111111;
            --input-bg: #1a1a1a;
            --border-color: #222222;
            --text-placeholder: #555555;
            --gradient: linear-gradient(90deg, #9b00ff 0%, #3e00ff 100%);
        }

        body {
            background-color: var(--bg-main);
            color: #ffffff;
            font-family: 'Gilroy', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        .card {
            background-color: var(--card-bg);
            width: 760px;
            padding: 70px 65px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            letter-spacing: -0.02em;
        }

        h2 {
            font-size: 38px;
            font-weight: 400;
            margin: 0 0 45px 0;
            color: #ffffff;
            letter-spacing: -0.03em;
        }

        input[type="text"] {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            padding: 22px 32px;
            color: #ffffff;
            font-family: 'Gilroy', sans-serif;
            font-size: 18px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 35px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #3e00ff;
        }

        input[type="text"]::placeholder {
            color: var(--text-placeholder);
        }

        .tags {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .tag {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 14px 32px;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            cursor: pointer;
            transition: 0.2s;
        }

        .tag:hover {
            background-color: #222;
            border-color: #333;
            transform: translateY(-2px);
        }

        /* Кнопка плюс */
        .fab {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 55px;
            height: 55px;
            background-color: #1a1a1a;
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: #555;
            font-size: 28px;
            transition: 0.3s;
        }

        .fab:hover {
            color: #fff;
            border-color: #444;
            transform: rotate(90deg);
        }

        /* Компактное контекстное меню */
        #context-menu {
            position: absolute;
            display: none;
            background: #181818;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 4px 0;
            z-index: 1000;
            min-width: 160px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        #context-menu div {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #ccc;
            transition: 0.2s;
        }

        #context-menu div:hover {
            background: #252525;
            color: #9b00ff;
        }

        .menu-sep {
            height: 1px;
            background: #262626;
            margin: 2px 0;
            padding: 0 !important;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello, Daniil.</h1>
        <h2>What are you looking for?</h2>
        
        <input type="text" id="searchInp" placeholder="Search Google..." autocomplete="off">

        <div class="tags" id="bookmarkList">
            </div>
    </div>

    <div class="fab" onclick="addBookmark()">+</div>

    <div id="context-menu">
        <div onclick="editBookmark()">Edit Bookmark</div>
        <div class="menu-sep"></div>
        <div onclick="deleteBookmark()" style="color: #ff4b4b;">Delete Bookmark</div>
    </div>

    <script>
        const searchInp = document.getElementById('searchInp');
        const bookmarkList = document.getElementById('bookmarkList');
        const ctxMenu = document.getElementById('context-menu');
        let selectedIdx = null;

        // 1. Логика поиска Google
        searchInp.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && searchInp.value.trim() !== "") {
                window.location.href = `https://www.google.com/search?q=${encodeURIComponent(searchInp.value)}`;
            }
        });

        // 2. Управление данными закладок
        let bookmarks = JSON.parse(localStorage.getItem('my_bookmarks')) || [
            { name: 'Cybershoke', url: 'https://cybershoke.net' },
            { name: 'Faceit', url: 'https://faceit.com' },
            { name: 'Steam', url: 'https://store.steampowered.com' }
        ];

        // Отрисовка списка
        function render() {
            bookmarkList.innerHTML = '';
            bookmarks.forEach((bm, index) => {
                const a = document.createElement('a');
                a.className = 'tag';
                a.innerText = bm.name;
                a.href = bm.url;
                // Steam Browser часто открывает ссылки в том же окне, 
                // если нужно в новом — добавьте a.target = "_blank";
                
                // Обработка правой кнопки мыши
                a.oncontextmenu = (e) => {
                    e.preventDefault();
                    showCtx(e, index);
                };
                bookmarkList.appendChild(a);
            });
            localStorage.setItem('my_bookmarks', JSON.stringify(bookmarks));
        }

        // Добавление
        function addBookmark() {
            const name = prompt("Название сайта:");
            const url = prompt("URL адрес (с https://):", "https://");
            if (name && url) {
                bookmarks.push({ name, url });
                render();
            }
        }

        // Вызов контекстного меню
        function showCtx(e, index) {
            selectedIdx = index;
            ctxMenu.style.display = 'block';
            ctxMenu.style.left = e.pageX + 'px';
            ctxMenu.style.top = e.pageY + 'px';
        }

        // Редактирование
        function editBookmark() {
            if (selectedIdx !== null) {
                const current = bookmarks[selectedIdx];
                const newName = prompt("Изменить название:", current.name);
                const newUrl = prompt("Изменить URL:", current.url);
                
                if (newName && newUrl) {
                    bookmarks[selectedIdx] = { name: newName, url: newUrl };
                    render();
                }
            }
            ctxMenu.style.display = 'none';
        }

        // Удаление
        function deleteBookmark() {
            if (selectedIdx !== null) {
                if(confirm(`Удалить закладку ${bookmarks[selectedIdx].name}?`)) {
                    bookmarks.splice(selectedIdx, 1);
                    render();
                }
            }
            ctxMenu.style.display = 'none';
        }

        // Закрытие меню при клике в любое место или нажатии Esc
        window.onclick = () => ctxMenu.style.display = 'none';
        window.onkeydown = (e) => { if(e.key === "Escape") ctxMenu.style.display = 'none'; };

        // Инициализация
        render();
    </script>
</body>
</html>

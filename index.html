<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Homepage - Final</title>
    <style>
        @font-face {
            font-family: 'Gilroy';
            src: url('https://db.onlinewebfonts.com/t/1dc8ecd8056a0f5aa767ca893f544ca3.woff2') format('woff2');
            font-weight: 700;
        }
        @font-face {
            font-family: 'Gilroy';
            src: url('https://db.onlinewebfonts.com/t/2af9a99799980838978589255a004732.woff2') format('woff2');
            font-weight: 400;
        }

        :root {
            --bg-main: #0c0c0c;
            --card-bg: #111111;
            --input-bg: #1a1a1a;
            --border-color: #222222;
            --accent: #3e00ff;
            --gradient: linear-gradient(90deg, #9b00ff 0%, #3e00ff 100%);
        }

        body {
            background-color: var(--bg-main);
            color: #ffffff;
            font-family: 'Gilroy', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Контейнер */
        .card {
            background-color: var(--card-bg);
            width: 760px;
            padding: 70px 65px;
            border-radius: 40px;
            border: 1px solid var(--border-color);
            position: relative;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        h2 { font-size: 38px; font-weight: 400; margin: 0 0 45px 0; }

        input[type="text"] {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            padding: 22px 32px;
            color: #ffffff;
            font-family: 'Gilroy', sans-serif;
            font-size: 18px;
            outline: none;
            box-sizing: border-box;
            margin-bottom: 35px;
        }

        .tags { display: flex; gap: 15px; flex-wrap: wrap; }

        .tag {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            padding: 14px 32px;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .tag:hover { background-color: #222; transform: translateY(-2px); }

        /* Модальное окно (Форма добавления/ред.) */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-form {
            background: #151515;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid #333;
            width: 400px;
        }

        .modal-form input {
            width: 100%;
            background: #222;
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            color: #fff;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
            font-family: 'Gilroy', sans-serif;
        }

        .modal-buttons { display: flex; gap: 10px; }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 15px;
            border: none;
            cursor: pointer;
            font-family: 'Gilroy', sans-serif;
            font-weight: 700;
            transition: 0.2s;
        }

        .btn-save { background: var(--accent); color: white; }
        .btn-cancel { background: #333; color: #ccc; }
        .modal-btn:hover { opacity: 0.8; }

        /* ПКМ Меню */
        #context-menu {
            position: absolute;
            display: none;
            background: #181818;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 4px 0;
            z-index: 1000;
            min-width: 160px;
        }

        #context-menu div {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            color: #ccc;
        }

        #context-menu div:hover { background: #252525; color: #9b00ff; }
        .menu-sep { height: 1px; background: #262626; margin: 2px 0; }

        .fab {
            position: fixed; bottom: 40px; right: 40px;
            width: 55px; height: 55px; background: #1a1a1a;
            border: 1px solid var(--border-color); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; color: #555; font-size: 28px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hello, Daniil.</h1>
        <h2>What are you looking for?</h2>
        <input type="text" id="searchInp" placeholder="Search Google..." autocomplete="off">
        <div class="tags" id="bookmarkList"></div>
    </div>

    <div class="fab" onclick="openModal()">+</div>

    <div id="modal-overlay">
        <div class="modal-form">
            <h3 style="margin-top: 0;">Bookmark Details</h3>
            <input type="text" id="bm-name" placeholder="Site Name (e.g. YouTube)">
            <input type="text" id="bm-url" placeholder="URL (https://...)">
            <div class="modal-buttons">
                <button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="modal-btn btn-save" onclick="saveBookmark()">Save</button>
            </div>
        </div>
    </div>

    <div id="context-menu">
        <div onclick="prepEdit()">Edit Bookmark</div>
        <div class="menu-sep"></div>
        <div onclick="deleteBookmark()" style="color: #ff4b4b;">Delete</div>
    </div>

    <script>
        const bookmarkList = document.getElementById('bookmarkList');
        const modal = document.getElementById('modal-overlay');
        const ctxMenu = document.getElementById('context-menu');
        let bookmarks = JSON.parse(localStorage.getItem('my_bookmarks')) || [
            { name: 'Cybershoke', url: 'https://cybershoke.net' },
            { name: 'Faceit', url: 'https://faceit.com' }
        ];
        let editIdx = null;
        let selectedIdx = null;

        // Поиск
        document.getElementById('searchInp').onkeypress = (e) => {
            if (e.key === 'Enter') window.location.href = `https://www.google.com/search?q=${e.target.value}`;
        };

        function render() {
            bookmarkList.innerHTML = '';
            bookmarks.forEach((bm, i) => {
                const a = document.createElement('a');
                a.className = 'tag';
                a.innerText = bm.name;
                a.href = bm.url;
                a.oncontextmenu = (e) => {
                    e.preventDefault();
                    selectedIdx = i;
                    ctxMenu.style.display = 'block';
                    ctxMenu.style.left = e.pageX + 'px';
                    ctxMenu.style.top = e.pageY + 'px';
                };
                bookmarkList.appendChild(a);
            });
            localStorage.setItem('my_bookmarks', JSON.stringify(bookmarks));
        }

        // Модальное окно
        function openModal() {
            editIdx = null;
            document.getElementById('bm-name').value = '';
            document.getElementById('bm-url').value = 'https://';
            modal.style.display = 'flex';
        }

        function closeModal() { modal.style.display = 'none'; }

        function saveBookmark() {
            const name = document.getElementById('bm-name').value;
            const url = document.getElementById('bm-url').value;
            if(!name || !url) return;

            if(editIdx !== null) bookmarks[editIdx] = {name, url};
            else bookmarks.push({name, url});
            
            render();
            closeModal();
        }

        function prepEdit() {
            editIdx = selectedIdx;
            document.getElementById('bm-name').value = bookmarks[editIdx].name;
            document.getElementById('bm-url').value = bookmarks[editIdx].url;
            ctxMenu.style.display = 'none';
            modal.style.display = 'flex';
        }

        function deleteBookmark() {
            bookmarks.splice(selectedIdx, 1);
            render();
            ctxMenu.style.display = 'none';
        }

        window.onclick = (e) => {
            if(e.target == modal) closeModal();
            ctxMenu.style.display = 'none';
        };

        render();
    </script>
</body>
</html>
